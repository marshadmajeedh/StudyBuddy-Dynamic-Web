<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>StudyBuddy</title>
    </head>

    <body>
        <h1>Student Task Manager</h1>
        <section id="task-manager-section">

            <div class="task-manager-container">

                <h2>Filter Tasks</h2>
                <div class="filter-methods-container">
                    
                    <label for="delete-by-index">Delete by index:</label>
                    <input type="number" id="delete-by-index" name="delete-by-index" placeholder="Enter index number">
                    <button type="button" value="Delete" id="delete-by-index-btn">Delete</button>

                    <button type="button" value="Filter" id="filter-btn">Filter</button>

                    <label for="find-by-name">Find task by name:</label>
                    <input type="text" id="find-by-name" placeholder="Enter task name">
                    <button type="button" value="Find" id="find-btn">Find</button>

                    <button type="button" value="Sort" id="sort-btn">Sort</button>
                </div>
                
                <h2>Organize Your tasks</h2>
                <div class="enter-task-container">
                    <label for="enter-task">Enter Task:</label>
                    <input id="enter-task" name="enter-task" type="text" placeholder="Enter task name here">
                    <button type="button" value="Add" id="add-btn">Add</button>
                </div>
                
                <div class="task-container">
                    <div class="task-container-button">
                        <button type="button" id="deleteLastElement">Delete last element</button>
                        <button type="button" id="deleteFirstElement">Delete first element</button>
                    </div>
                    <ol id="task-list">
                    </ol>
                    <ol id="in-completed-task-list">
                    </ol>
                </div>
            </div>

        </section>

        <section id="gpa-calculator-section">

            <div class="gpa-calculator-container">
                <form>
                    <fieldset id="field-set">

                        <legend>Calculate GPA</legend>

                        <label for="course-name">Course name:</label>
                        <input id="course-name" name="course-name" type="text" placeholder="Course name">

                        <label for="course-credit">Course credit:</label>
                        <input id="course-credit" name="course-credit" type="number" placeholder="Course credit">

                        <label for="course-grade">Course grade:</label>
                        <input id="course-grade" name="course-grade" type="text" placeholder="Course grade">
                        <button type="button" id="add-more-course" value="+">+</button>                    </fieldset>
                </form>

                <div class="calculate-button-container">
                    <button type="button" value="Calculate" id="calculate-btn" name="calculate">Calculate</button>
                </div>

                <div class="result-container">
                    <span id="gpa-result">Result:</span><span id="gpa-calculation">calculating....</span>
                </div>
            </div>

        </section>

        <script src="main.js"></script>
    </body>
</html>
