<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>StudyBuddy</title>
    </head>

    <body>
        <h1>Student Task Manager</h1>
        <section id="task-manager-section">

            <div class="task-manager-container">
                <!--Second box-->
                <h2>Filter Tasks</h2>
                <div class="filter-methods-container">
                    <!--Third box-->

                    <!--Delete a task by its index-->
                    <label for="delete-by-index">Delete by index:</label>
                    <input type="number" id="delete-by-index" name="delete-by-index" placeholder="Enter index number">
                    <button type="button" value="Delete" id="delete-by-index-btn">Delete</button>

                    <!--Filter button for incomplete tasks-->
                    <button type="button" value="Filter" id="filter-btn">Filter</button>
                    <button type="button" value="Reset" id="reset-btn">Reset</button>

                    <!--Search a task by its name-->
                    <label for="find-by-name">Find task by name:</label>
                    <input type="text" id="find-by-name" placeholder="Enter task name">
                    <button type="button" value="Find" id="find-btn">Find</button>

                    <!--Alphabetize tasks-->
                    <button type="button" value="Sort" id="sort-btn">Sort</button>
                    <button type="button" value="Reverse" id="reverse-btn">Reverse</button>
                </div>
                
                <h2>Organize Your tasks</h2>
                <!--Fourth box-->
                <div class="enter-task-container">
                    <!--Here we enter task name-->
                    <label for="enter-task">Enter Task:</label>
                    <input id="enter-task" name="enter-task" type="text" placeholder="Enter task name here">

                    <!--Here we enter task's priority whether its low, medium or high-->
                    <label for="set-priority">Priority:</label>
                    <select id="set-priority">
                        <option id="low" value="low">Low</option>
                        <option id="medium" value="medium">Medium</option>
                        <option id="high" value="high">High</option>
                    </select>

                    <!--Add button add the task to list-->
                    <button type="button" value="Add" id="add-btn">Add</button>
                </div>
                
                <!--Fifth box-->
                <div class="task-container">

                    <!--Sixth box-->
                    <div class="task-container-button">

                        <!--This button delete the last task from the list-->
                        <button type="button" id="deleteLastElement">Delete last element</button>

                        <!--This button delete the first task from the list-->
                        <button type="button" id="deleteFirstElement">Delete first element</button>
                    </div>

                    <!--This is an ordered list to store all the task created by the user-->
                    <ol id="task-list">
                    </ol>
                </div>
            </div>

        </section>
        
        <script src="function.js"></script>
        <script src="addTask.js"></script>
        <script src="delete.js"></script>
        <script src="filter.js"></script>
        <script src="find.js"></script>
        <script src="sort.js"></script>
        <script src="reverse.js"></script>
        <script src="reset.js"></script>

    </body>
</html>
